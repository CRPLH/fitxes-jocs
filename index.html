<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitxa Joc de Taula - LOMLOE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --salmon: #f7a98b;
            --salmon-light: #fce8de;
            --teal: #5bbfb5;
            --yellow: #f5c842;
            --purple: #9b7fd4;
            --danger: #ff6b6b;
            --text: #3a3a3a;
            --border: #d0b8b0;
            --white: #fff;
            
            /* Colors per als grups */
            --color-P: #ff6b6b;
            --color-P-bg: #fff1f1;
            --color-M: #f5c842;
            --color-M-bg: #fffbed;
            --color-G: #5bbfb5;
            --color-G-bg: #f0faf9;
            --color-J: #9b7fd4;
            --color-J-bg: #f7f4fd;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: #f0ebe6; min-height: 100vh; padding: 16px; color: var(--text); padding-bottom: 80px; }

        .page-title { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--salmon); text-align: center; margin-bottom: 12px; }
        
        .btn-row { display: flex; gap: 8px; justify-content: center; margin: 12px 0; flex-wrap: wrap; }
        .btn { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .82rem; border: none; border-radius: 10px; padding: 10px 20px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-nova { background: var(--salmon); color: white; }
        .btn-desar { background: var(--teal); color: white; }
        .btn-print { background: var(--purple); color: white; }
        .btn-delete { background: var(--danger); color: white; display: none; }
        
        .status { font-size: .85rem; color: var(--teal); font-weight: 700; margin: 10px auto; min-height: 24px; text-align: center; max-width: 900px; padding: 5px; border-radius: 8px; }

        #searchModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; 
            align-items: center; justify-content: center; z-index: 200; padding: 20px;
        }
        .modal-content { 
            background: white; border-radius: 20px; width: 100%; max-width: 500px; 
            max-height: 80vh; overflow-y: auto; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .search-result-item {
            padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .search-result-item:hover { background: var(--salmon-light); }

        /* FITXA DINÀMICA */
        .fitxa { 
            background: var(--white); 
            border-radius: 16px; 
            overflow: hidden; 
            max-width: 900px; 
            margin: 0 auto; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.12); 
            border: 4px solid var(--salmon); 
            position: relative; 
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }
        
        .fitxa-header { 
            background: rgba(255, 255, 255, 0.5); 
            padding: 16px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-bottom: 2px solid var(--salmon); 
            flex-wrap: wrap; 
            transition: border-color 0.4s ease;
        }
        
        .nom-joc-wrap { flex: 1; min-width: 250px; position: relative; }
        .nom-joc-input { width: 100%; font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 700; border: 2px solid var(--text); border-radius: 10px; padding: 8px 14px; background: white; outline: none; }
        
        .meta-pill { display: flex; align-items: center; gap: 5px; background: white; border: 2px solid var(--border); border-radius: 10px; padding: 6px 12px; font-size: .85rem; font-weight: 700; }
        
        .grup-selector-wrap { position: relative; }
        .grup-select { 
            appearance: none; -webkit-appearance: none;
            background: var(--color-P); color: white; font-family: 'Fredoka One', cursive; 
            font-size: 1.3rem; width: 44px; height: 44px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; text-align: center;
            border: 3px solid rgba(255,255,255,0.5); cursor: pointer; outline: none;
            transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .grup-select option { font-family: 'Nunito', sans-serif; font-size: 1rem; color: var(--text); background: white; }

        .fitxa-body { display: grid; grid-template-columns: 1fr 1fr; }
        .col-left { padding: 16px; border-right: 2px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; gap: 12px; }
        .col-right { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

        .imatge-joc { width: 100%; aspect-ratio: 4/3; border-radius: 12px; background: #eee; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .imatge-joc img { width: 100%; height: 100%; object-fit: contain; background: #f9f9f9; }

        .url-input-wrap { margin-top: 4px; }
        .url-input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 6px; font-size: 0.75rem; font-family: 'Nunito', sans-serif; outline: none; }
        
        .box { border: 2px solid var(--text); border-radius: 12px; padding: 12px; background: rgba(255,255,255,0.6); }
        .box-title { font-weight: 900; font-size: .8rem; margin-bottom: 8px; text-transform: uppercase; color: var(--text); opacity: 0.7; }
        .checkgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .check-item { display: flex; align-items: center; gap: 6px; font-size: .8rem; cursor: pointer; }

        .section-label { font-weight: 900; font-size: .85rem; text-transform: uppercase; margin-bottom: 6px; display: block; color: var(--text); opacity: 0.8; }
        .desc-box, .aplicacions-box, .variants-box { 
            background: rgba(255,255,255,0.7); border-radius: 10px; padding: 12px; font-size: .9rem; 
            line-height: 1.6; min-height: 80px; color: var(--text); border: 2px solid transparent; transition: all .2s;
        }
        .desc-box:focus, .aplicacions-box:focus, .variants-box:focus { background: white; border-color: var(--teal); outline: none; box-shadow: 0 0 10px rgba(91,191,181,0.2); }

        /* BIBLIOTECA I FILTRES */
        .fitxes-panel { max-width: 900px; margin: 20px auto; background: white; border-radius: 16px; border: 2px solid var(--border); overflow: hidden; }
        .panel-header { background: var(--salmon-light); padding: 12px 16px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        
        .filter-bar { padding: 12px 16px; background: #fdfdfd; border-bottom: 1px solid #eee; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-items: end; }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #888; }
        .filter-input { padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); font-family: 'Nunito', sans-serif; font-size: 0.85rem; outline: none; }
        .filter-input:focus { border-color: var(--teal); }

        .fitxes-list { padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; max-height: 500px; overflow-y: auto; }
        .card { border: 1px solid #eee; padding: 10px; border-radius: 12px; display: flex; gap: 10px; align-items: center; background: #fafafa; cursor: pointer; transition: all 0.2s; position: relative; }
        .card:hover { background: var(--salmon-light); transform: scale(1.02); }
        .card img { width: 60px; height: 60px; border-radius: 8px; object-fit: contain; background: #fff; border: 1px solid #ddd; }
        .card-info { flex: 1; }
        .card-title { font-weight: 800; font-size: 0.9rem; color: var(--text); display: block; }
        .card-meta { font-size: 0.75rem; color: #666; }
        .card-grup-tag { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border-radius: 50%; font-size: 0.65rem; color: white; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One', cursive; }
        
        .admin-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #333; color: white; padding: 10px; display: flex; justify-content: center; gap: 15px; align-items: center; font-size: 0.8rem; z-index: 100; }
        
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .etapa-select {
            width: 100%; margin-bottom: 10px; padding: 5px; border-radius: 6px; border: 1px solid var(--border);
            font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700;
        }

        @media print {
            .btn-row, .status, .fitxes-panel, .page-title, .admin-footer, .url-input-wrap, #searchModal, .etapa-select { display: none !important; }
            body { background: white; padding: 0; margin: 0; overflow: visible; }
            .fitxa { box-shadow: none; max-width: 100%; border: 2px solid #333; width: 100%; height: auto; position: static; background: white !important; }
            .grup-select { border: 2px solid #333; color: black !important; background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .fitxa-header, .desc-box, .aplicacions-box, .variants-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <p class="page-title">🕹️ Recull de Jocs BGG - Catalunya Educació</p>

    <div id="searchModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px; font-family: 'Fredoka One', cursive; color: var(--salmon);">Versions a la BGG:</h3>
            <div id="searchResultsList"></div>
            <button class="btn" onclick="document.getElementById('searchModal').style.display='none'" style="margin-top: 15px; width: 100%; background: #eee;">Cancel·lar</button>
        </div>
    </div>

    <div class="fitxa" id="fitxaActual">
        <div class="fitxa-header" id="fitxaHeader">
            <div class="nom-joc-wrap">
                <input class="nom-joc-input" id="nomJoc" type="text" placeholder="Cerca un joc i prem ENTER..." autocomplete="off">
            </div>
            <div class="meta-pill">👥 <span id="jugadorsVal" contenteditable="true">-</span></div>
            <div class="meta-pill">⏳ <span id="tempsVal" contenteditable="true">-</span></div>
            <div class="meta-pill">🎂 <span id="edatVal" contenteditable="true">-</span></div>
            
            <div class="grup-selector-wrap">
                <select id="grupSelect" class="grup-select">
                    <option value="P">P</option>
                    <option value="M">M</option>
                    <option value="G">G</option>
                    <option value="J">J</option>
                </select>
            </div>
        </div>

        <div class="fitxa-body">
            <div class="col-left">
                <div class="imatge-joc" id="imatgeWrap">
                    <div id="imgPlaceholder">📸 Imatge BGG</div>
                </div>
                <div class="url-input-wrap">
                    <input type="text" id="manualUrl" class="url-input" placeholder="URL d'imatge manual...">
                </div>
                <div class="box">
                    <div class="box-title">Àrees Curriculars (Decret 175/2022)</div>
                    <select id="etapaSelect" class="etapa-select">
                        <option value="primaria">Educació Primària</option>
                        <option value="eso">Educació Secundària (ESO)</option>
                    </select>
                    <div class="checkgrid" id="areasGrid">
                        <!-- Es carregarà dinàmicament -->
                    </div>
                </div>
            </div>

            <div class="col-right">
                <label class="section-label">Descripció Pedagògica</label>
                <div class="desc-box" id="descripcio" contenteditable="true"></div>
                
                <label class="section-label">Aplicació a l'Aula</label>
                <div class="aplicacions-box" id="aplicacions" contenteditable="true"></div>
            </div>
        </div>
        <div style="padding: 16px; border-top: 2px solid rgba(0,0,0,0.05)">
            <label class="section-label">Variants i Adaptacions (DUA)</label>
            <div class="variants-box" id="variants" contenteditable="true"></div>
        </div>
    </div>

    <div id="statusMsg" class="status"></div>

    <div class="btn-row">
        <button class="btn btn-nova" id="btnNova">✨ Nova Fitxa</button>
        <button class="btn btn-desar" id="btnGuardar">💾 Desar al Núvol</button>
        <button class="btn btn-print" id="btnPrint">🖨️ Imprimir</button>
        <button class="btn btn-delete" id="btnDelete">🗑️ Esborrar</button>
    </div>

    <div class="fitxes-panel">
        <div class="panel-header">
            <span>📚 Biblioteca Verificada</span>
            <span id="counter" style="font-size: 0.8rem; font-weight: normal"></span>
        </div>
        
        <!-- Barra de Filtres -->
        <div class="filter-bar">
            <div class="filter-group">
                <label class="filter-label">Nom del joc</label>
                <input type="text" id="filterNom" class="filter-input" placeholder="Cerca...">
            </div>
            <div class="filter-group">
                <label class="filter-label">Grup</label>
                <select id="filterGrup" class="filter-input">
                    <option value="">Tots</option>
                    <option value="P">P - Petits</option>
                    <option value="M">M - Mitjans</option>
                    <option value="G">G - Grans</option>
                    <option value="J">J - Joves</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Àrea Curricular</label>
                <select id="filterArea" class="filter-input">
                    <option value="">Totes</option>
                    <!-- Dinàmic -->
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Edat</label>
                <input type="text" id="filterEdat" class="filter-input" placeholder="+8, 10...">
            </div>
            <div class="filter-group">
                <label class="filter-label">Temps</label>
                <input type="text" id="filterTemps" class="filter-input" placeholder="30, 45min...">
            </div>
        </div>

        <div class="fitxes-list" id="fitxesList"></div>
    </div>

    <div class="admin-footer">
        <span>Admin:</span>
        <input type="password" id="adminPass" placeholder="Clau...">
        <span id="myUid" style="opacity: 0.5; font-size: 0.6rem;"></span>
    </div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const apiKey = ""; 
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    let currentImageUrl = null;
    let currentUser = null;
    let currentDocId = null;
    let allGames = []; 

    const areesCurriculars = {
        primaria: [
            "Llengua Catalana i Literatura",
            "Llengua Castellana i Literatura",
            "Llengua Estrangera",
            "Matemàtiques",
            "Coneixement del Medi Natural, Social i Cultural",
            "Educació Artística (Plàstica, Música i Dansa)",
            "Educació Física",
            "Educació en Valors Cívics i Ètics"
        ],
        eso: [
            "Llengua Catalana i Literatura",
            "Llengua Castellana i Literatura",
            "Llengua Estrangera",
            "Matemàtiques",
            "Ciències de la Naturalesa (Bio i Geo / Fis i Quim)",
            "Geografia i Història",
            "Educació Física",
            "Educació en Valors Cívics i Ètics",
            "Educació Artística (Plàstica / Música)",
            "Tecnologia i Digitalització",
            "Llengua de Signes Catalana"
        ]
    };

    function loadAreasUI(etapa) {
        const grid = document.getElementById('areasGrid');
        const filterArea = document.getElementById('filterArea');
        
        grid.innerHTML = '';
        const llista = areesCurriculars[etapa] || [];
        
        llista.forEach(area => {
            const label = document.createElement('label');
            label.className = 'check-item';
            label.innerHTML = `<input type="checkbox" value="${area}"> ${area}`;
            grid.appendChild(label);
        });

        const totesLesArees = [...new Set([...areesCurriculars.primaria, ...areesCurriculars.eso])].sort();
        filterArea.innerHTML = '<option value="">Totes</option>';
        totesLesArees.forEach(area => {
            const opt = document.createElement('option');
            opt.value = area;
            opt.textContent = area;
            filterArea.appendChild(opt);
        });
    }

    function showStatus(m, c) {
        const s = document.getElementById('statusMsg');
        if (!s) return;
        s.innerHTML = m;
        s.style.color = (c === 'teal' || c === 'green') ? '#5bbfb5' : (c === 'orange' ? '#f5c842' : '#ff6b6b');
    }

    const initAuth = async () => {
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (error) {
            console.error("Auth Error:", error);
            showStatus("Error d'autenticació.", "red");
        }
    };

    function updateGrupColor(val) {
        const selectEl = document.getElementById('grupSelect');
        const fitxaEl = document.getElementById('fitxaActual');
        const headerEl = document.getElementById('fitxaHeader');

        if (selectEl) selectEl.style.backgroundColor = `var(--color-${val})`;
        if (fitxaEl) {
            fitxaEl.style.backgroundColor = `var(--color-${val}-bg)`;
            fitxaEl.style.borderColor = `var(--color-${val})`;
        }
        if (headerEl) {
            headerEl.style.borderBottomColor = `var(--color-${val})`;
        }
    }

    function updateImageUI(url) {
        currentImageUrl = url;
        const wrap = document.getElementById('imatgeWrap');
        const manualInput = document.getElementById('manualUrl');
        
        if (url) {
            wrap.innerHTML = `<img src="${url}" id="imgDisplay" crossorigin="anonymous">`;
            const img = document.getElementById('imgDisplay');
            img.onerror = () => {
                img.src = `https://images.weserv.nl/?url=${encodeURIComponent(url)}`;
                img.onerror = () => {
                   wrap.innerHTML = `<div id="imgPlaceholder">⚠️ Error imatge</div>`;
                };
            };
        } else {
            wrap.innerHTML = `<div id="imgPlaceholder">📸 Imatge BGG</div>`;
        }
        if (manualInput) manualInput.value = url || '';
    }

    async function callGemini(prompt, schema) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "Ets un expert en jocs de taula i currículum català (LOMLOE). Respon en català." }] },
                tools: [{ "google_search": {} }],
                generationConfig: { 
                    responseMimeType: "application/json",
                    responseSchema: schema
                }
            })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return JSON.parse(data.candidates[0].content.parts[0].text);
    }

    async function searchBGG(gameName) {
        if (!gameName.trim()) return;
        showStatus('<div class="spinner"></div> Buscant a la BGG...', 'teal');
        try {
            const schema = {
                type: "OBJECT",
                properties: {
                    results: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                                bggId: { type: "STRING" },
                                name: { type: "STRING" },
                                year: { type: "STRING" }
                            }
                        }
                    }
                }
            };
            
            const json = await callGemini(`Cerca les versions del joc "${gameName}" a la BoardGameGeek. Retorna bggId, nom oficial i any.`, schema);
            const items = json.results || [];

            if (items.length === 0) return showStatus("No s'ha trobat cap resultat.", "red");

            const modal = document.getElementById('searchModal');
            const list = document.getElementById('searchResultsList');
            list.innerHTML = '';
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'search-result-item';
                div.innerHTML = `<span>${item.name} (${item.year})</span> ➕`;
                div.onclick = () => {
                    modal.style.display = 'none';
                    loadGameDetails(item.bggId, item.name);
                };
                list.appendChild(div);
            });
            modal.style.display = 'flex';
            showStatus("Selecciona una versió", "teal");
        } catch (e) { 
            console.error(e);
            showStatus("Error en la cerca.", "red"); 
        }
    }

    async function loadGameDetails(bggId, selectedName) {
        showStatus('<div class="spinner"></div> Carregant detalls...', 'teal');
        const etapaActual = document.getElementById('etapaSelect').value;
        try {
            const schema = {
                type: "OBJECT",
                properties: {
                    name: { type: "STRING" },
                    players: { type: "STRING" },
                    time: { type: "STRING" },
                    age: { type: "STRING" },
                    imageUrl: { type: "STRING" },
                    descPedagogica: { type: "STRING" },
                    aplicacioAula: { type: "STRING" }
                }
            };

            const json = await callGemini(`Dades bggId ${bggId}. Explica aplicacions a l'aula per a l'etapa de ${etapaActual} segons el Decret 175/2022 català.`, schema);

            document.getElementById('nomJoc').value = json.name || selectedName;
            document.getElementById('jugadorsVal').innerText = json.players || '-';
            document.getElementById('tempsVal').innerText = json.time || '-';
            document.getElementById('edatVal').innerText = json.age || '-';
            document.getElementById('descripcio').innerText = json.descPedagogica || '';
            document.getElementById('aplicacions').innerText = json.aplicacioAula || '';
            updateImageUI(json.imageUrl);
            showStatus('Dades carregades correctament.', 'teal');
        } catch (e) { 
            console.error(e);
            showStatus("Error carregant detalls.", "red"); 
        }
    }

    async function saveGame() {
        if (!currentUser) return showStatus('Error: Usuari no identificat', 'red');
        const nom = document.getElementById('nomJoc').value.trim();
        if (!nom) return showStatus('El nom és obligatori', 'orange');

        const data = {
            nom,
            jugadors: document.getElementById('jugadorsVal').innerText,
            temps: document.getElementById('tempsVal').innerText,
            edat: document.getElementById('edatVal').innerText,
            grup: document.getElementById('grupSelect').value,
            etapa: document.getElementById('etapaSelect').value,
            descripcio: document.getElementById('descripcio').innerText,
            aplicacions: document.getElementById('aplicacions').innerText,
            variants: document.getElementById('variants').innerText,
            imatge: currentImageUrl,
            areas: Array.from(document.querySelectorAll('#areasGrid input:checked')).map(c => c.value),
            author: currentUser.uid,
            updatedAt: Date.now()
        };

        try {
            if (currentDocId) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'jocs', currentDocId), data, { merge: true });
            } else {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'jocs'), data);
            }
            showStatus('Fitxa desada correctament!', 'teal');
            reset();
        } catch (e) { 
            console.error(e);
            showStatus('Error en desar.', 'red'); 
        }
    }

    function renderFilteredGames() {
        const list = document.getElementById('fitxesList');
        const fNom = document.getElementById('filterNom').value.toLowerCase();
        const fGrup = document.getElementById('filterGrup').value;
        const fArea = document.getElementById('filterArea').value;
        const fEdat = document.getElementById('filterEdat').value.toLowerCase();
        const fTemps = document.getElementById('filterTemps').value.toLowerCase();

        const filtered = allGames.filter(g => {
            const matchNom = g.nom.toLowerCase().includes(fNom);
            const matchGrup = fGrup === "" || g.grup === fGrup;
            const matchArea = fArea === "" || (g.areas && g.areas.includes(fArea));
            const matchEdat = fEdat === "" || g.edat.toLowerCase().includes(fEdat);
            const matchTemps = fTemps === "" || g.temps.toLowerCase().includes(fTemps);
            
            return matchNom && matchGrup && matchArea && matchEdat && matchTemps;
        });

        list.innerHTML = '';
        document.getElementById('counter').innerText = `${filtered.length} fitxes filtrades`;
        
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            const thumb = item.imatge ? `https://images.weserv.nl/?url=${encodeURIComponent(item.imatge)}&w=60&h=60&fit=cover` : 'https://placehold.co/60x60?text=?';
            
            card.innerHTML = `
                <div class="card-grup-tag" style="background: var(--color-${item.grup})">${item.grup}</div>
                <img src="${thumb}">
                <div class="card-info">
                    <span class="card-title">${item.nom}</span>
                    <span class="card-meta">${item.jugadors} jug. • ${item.temps} • ${item.edat}</span><br>
                    <span class="card-meta" style="font-size: 0.65rem; color: var(--teal)">${item.etapa === 'eso' ? 'ESO' : 'Primària'}</span>
                </div>
            `;
            
            card.onclick = () => {
                currentDocId = item.id;
                fillForm(item);
                document.getElementById('btnDelete').style.display = 'flex';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            list.appendChild(card);
        });
    }

    function loadGames() {
        if (!currentUser) return;
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'jocs'), (snap) => {
            allGames = [];
            snap.forEach(d => {
                allGames.push({ id: d.id, ...d.data() });
            });
            renderFilteredGames();
        }, (err) => console.error(err));
    }

    function fillForm(g) {
        document.getElementById('nomJoc').value = g.nom || '';
        document.getElementById('jugadorsVal').innerText = g.jugadors || '-';
        document.getElementById('tempsVal').innerText = g.temps || '-';
        document.getElementById('edatVal').innerText = g.edat || '-';
        document.getElementById('grupSelect').value = g.grup || 'P';
        updateGrupColor(g.grup || 'P');
        
        const etapa = g.etapa || 'primaria';
        document.getElementById('etapaSelect').value = etapa;
        loadAreasUI(etapa);

        document.getElementById('descripcio').innerText = g.descripcio || '';
        document.getElementById('aplicacions').innerText = g.aplicacions || '';
        document.getElementById('variants').innerText = g.variants || '';
        updateImageUI(g.imatge);
        
        setTimeout(() => {
            document.querySelectorAll('#areasGrid input').forEach(c => c.checked = g.areas?.includes(c.value));
        }, 50);

        showStatus('Editant: ' + g.nom, 'teal');
    }

    function reset() {
        currentDocId = null;
        document.getElementById('nomJoc').value = '';
        document.getElementById('jugadorsVal').innerText = '-';
        document.getElementById('tempsVal').innerText = '-';
        document.getElementById('edatVal').innerText = '-';
        document.getElementById('descripcio').innerText = '';
        document.getElementById('aplicacions').innerText = '';
        document.getElementById('variants').innerText = '';
        document.getElementById('grupSelect').value = 'P';
        updateGrupColor('P');
        updateImageUI('');
        loadAreasUI(document.getElementById('etapaSelect').value);
        document.getElementById('btnDelete').style.display = 'none';
        showStatus('', 'teal');
    }

    const initApp = async () => {
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('myUid').innerText = user.uid;
                loadGames();
            }
        });

        document.getElementById('nomJoc').onkeypress = (e) => { 
            if(e.key === 'Enter') searchBGG(e.target.value); 
        };
        
        document.getElementById('btnNova').onclick = reset;
        document.getElementById('btnGuardar').onclick = saveGame;
        document.getElementById('btnPrint').onclick = () => window.print();
        
        document.getElementById('grupSelect').onchange = (e) => updateGrupColor(e.target.value);
        document.getElementById('manualUrl').onchange = (e) => updateImageUI(e.target.value);
        document.getElementById('etapaSelect').onchange = (e) => loadAreasUI(e.target.value);

        // Listeners de filtres de biblioteca separats
        ['filterNom', 'filterGrup', 'filterArea', 'filterEdat', 'filterTemps'].forEach(id => {
            document.getElementById(id).addEventListener('input', renderFilteredGames);
        });

        document.getElementById('btnDelete').onclick = async () => {
            if (currentDocId && confirm('Esborrar fitxa?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'jocs', currentDocId));
                reset();
                showStatus('Esborrat.', 'orange');
            }
        };

        loadAreasUI('primaria');
        updateGrupColor('P');
        await initAuth();
    };

    window.onload = initApp;

</script>
</body>
</html>
